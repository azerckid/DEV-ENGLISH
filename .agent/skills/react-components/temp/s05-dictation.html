<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Dictation Exercise | DEV-ENGLISH</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 py-3 sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">terminal</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight font-mono">DEV-ENGLISH</h2>
</div>
<div class="flex flex-1 justify-end gap-4 md:gap-8">
<div class="flex items-center gap-2 md:gap-6">
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium px-3 py-2 rounded-lg" href="#">Learn</a>
<a class="text-primary bg-primary/10 text-sm font-medium px-3 py-2 rounded-lg" href="#">Practice</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium px-3 py-2 rounded-lg" href="#">Community</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium px-3 py-2 rounded-lg" href="#">Profile</a>
</div>
</div>
</header>
<main class="flex flex-1 flex-col items-center pt-8 pb-20 px-4 md:px-0">
<div class="w-full max-w-[800px] flex flex-col gap-8">
<!-- Progress Section -->
<div class="flex flex-col gap-3 w-full">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Current Progress</span>
<p class="text-slate-900 dark:text-white text-xl font-bold">4 <span class="text-slate-400 dark:text-slate-600 font-normal">/ 20</span></p>
</div>
<p class="text-primary text-sm font-bold">20% Complete</p>
</div>
<div class="h-3 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 20%;"></div>
</div>
</div>
<!-- Main Exercise Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 border border-slate-200 dark:border-slate-800 p-8 md:p-12 flex flex-col items-center gap-10">
<div class="text-center">
<h1 class="text-slate-900 dark:text-white text-3xl font-extrabold tracking-tight">받아쓰기</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Listen to the pronunciation and type what you hear.</p>
</div>
<!-- Audio Button -->
<div class="flex flex-col items-center gap-4">
<button class="group flex h-24 w-24 items-center justify-center rounded-full bg-primary text-white shadow-lg shadow-primary/30 hover:bg-primary/90 transition-all active:scale-95">
<span class="material-symbols-outlined text-4xl">volume_up</span>
</button>
<span class="text-sm font-bold text-primary uppercase tracking-widest">발음 듣기</span>
</div>
<!-- Input Field Section -->
<div class="w-full max-w-lg space-y-6">
<div class="relative">
<textarea class="block w-full min-h-[140px] px-6 py-5 text-xl font-medium text-slate-900 dark:text-white bg-slate-50 dark:bg-slate-800/50 border-2 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all resize-none placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="들은 단어를 입력하세요..."></textarea>
<div class="absolute bottom-4 right-4 text-slate-400 dark:text-slate-600">
<span class="material-symbols-outlined">keyboard</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 px-8 bg-primary hover:bg-primary/90 text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>확인</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
<!-- Shortcut Tip -->
<div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 text-sm">
<span class="material-symbols-outlined text-base">info</span>
<p>Press <kbd class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded border border-slate-300 dark:border-slate-700 font-mono text-xs">Enter</kbd> to submit</p>
</div>
</div>
<!-- Additional Context (Optional/Subtle) -->
<div class="flex justify-center gap-8 text-slate-400 dark:text-slate-600">
<div class="flex items-center gap-2 cursor-pointer hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-lg">help</span>
<span class="text-sm font-medium">Hint</span>
</div>
<div class="flex items-center gap-2 cursor-pointer hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined text-lg">flag</span>
<span class="text-sm font-medium">Report issue</span>
</div>
</div>
</div>
</main>
<!-- Footer-like space -->
<footer class="py-6 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-xs text-slate-400 dark:text-slate-600 font-mono">© 2024 DEV-ENGLISH. Focus on your syntax.</p>
</footer>
</div>
</div>
</body></html>
