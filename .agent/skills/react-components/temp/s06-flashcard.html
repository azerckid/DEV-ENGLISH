<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<title>DEV-ENGLISH Flashcard Game</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-10 py-3">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">terminal</span>
</div>
<h1 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">DEV-ENGLISH</h1>
</div>
<div class="flex gap-3">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<main class="flex flex-1 justify-center py-8 px-4">
<div class="layout-content-container flex flex-col max-w-[640px] flex-1 gap-8">
<!-- Progress Section -->
<div class="flex flex-col gap-4 bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="flex justify-between items-end">
<div class="flex flex-col gap-1">
<span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Progress</span>
<p class="text-2xl font-bold text-slate-900 dark:text-white">8 <span class="text-slate-400 font-medium text-lg">/ 20</span></p>
</div>
<div class="flex gap-3">
<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800/30">
<span class="material-symbols-outlined text-sm">check_circle</span>
<span class="text-sm font-bold">맞힘 6개</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 border border-rose-100 dark:border-rose-800/30">
<span class="material-symbols-outlined text-sm">cancel</span>
<span class="text-sm font-bold">틀림 2개</span>
</div>
</div>
</div>
<div class="w-full h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 40%;"></div>
</div>
</div>
<!-- Main Flashcard (Front) -->
<div class="group perspective-1000 cursor-pointer">
<div class="relative bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-10 min-h-[360px] flex flex-col items-center justify-between text-center transition-transform hover:scale-[1.01] active:scale-[0.99]">
<div class="w-full">
<div class="flex justify-center mb-6">
<div class="px-3 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full border border-primary/20">
                                    React Docs
                                </div>
</div>
<h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-8 tracking-tight">reconciliation</h2>
<div class="max-w-md mx-auto">
<p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 leading-relaxed italic">
                                    "React uses a <span class="border-b-2 border-slate-300 dark:border-slate-700 px-8 inline-block"></span> algorithm to determine what has changed."
                                </p>
</div>
</div>
<div class="flex flex-col items-center gap-2 mt-8">
<span class="material-symbols-outlined text-slate-400 animate-bounce">touch_app</span>
<p class="text-slate-400 text-sm font-medium tracking-wide">클릭하여 뒤집기</p>
</div>
</div>
</div>
<!-- Action Area -->
<div class="flex flex-col items-center gap-4">
<div class="flex w-full gap-4">
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed font-bold text-lg" disabled="">
<span class="material-symbols-outlined">check</span>
                            맞힘
                        </button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed font-bold text-lg" disabled="">
<span class="material-symbols-outlined">close</span>
                            틀림
                        </button>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800/50 rounded-full">
<span class="material-symbols-outlined text-sm text-slate-500">info</span>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">카드를 먼저 뒤집어 주세요</p>
</div>
</div>
</div>
</main>
<!-- Footer Info -->
<footer class="p-6 text-center text-slate-400 text-xs">
<p>© 2024 DEV-ENGLISH Flashcards. Optimized for Developer Success.</p>
</footer>
</div>

```</body></html>
